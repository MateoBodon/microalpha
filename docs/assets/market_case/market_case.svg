<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
<title id="title">Microalpha real-data market risk case</title>
<desc id="desc">A fixed volatility-targeting rule reduces drawdown and raises descriptive Sharpe, but its corrected differential return is not statistically significant.</desc>
<rect width="1200" height="700" rx="28" fill="#07111f"/>
<text x="64" y="72" fill="#f8fafc" font-family="Inter,Arial,sans-serif" font-size="38" font-weight="700">Real data. Next-session execution. Honest inference.</text>
<text x="64" y="111" fill="#94a3b8" font-family="Inter,Arial,sans-serif" font-size="19">US market factor · 2017–2025 out of sample · fixed 10% volatility target</text>
<rect x="64" y="150" width="1072" height="104" rx="18" fill="#102137" stroke="#24415e"/>
<text x="94" y="187" fill="#7dd3fc" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">EMPIRICAL OBSERVATION</text>
<text x="94" y="226" fill="#f8fafc" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="700">Sharpe 1.04 vs 0.83 market; drawdown -15.3% vs -34.2%</text>
<rect x="64" y="286" width="246" height="178" rx="18" fill="#0f1d2f" stroke="#20324a"/>
<text x="88" y="326" fill="#7dd3fc" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700">NET RETURN</text>
<text x="88" y="379" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,monospace" font-size="31" font-weight="700">11.8%</text>
<text x="88" y="416" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="15">baseline 15.1%</text>
<text x="88" y="444" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="13">annualized</text>
<rect x="338" y="286" width="246" height="178" rx="18" fill="#0f1d2f" stroke="#20324a"/>
<text x="362" y="326" fill="#7dd3fc" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700">RISK-MATCHED</text>
<text x="362" y="379" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,monospace" font-size="31" font-weight="700">1.04</text>
<text x="362" y="416" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="15">baseline 0.90</text>
<text x="362" y="444" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="13">Sharpe</text>
<rect x="612" y="286" width="246" height="178" rx="18" fill="#0f1d2f" stroke="#20324a"/>
<text x="636" y="326" fill="#7dd3fc" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700">MAX DRAWDOWN</text>
<text x="636" y="379" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,monospace" font-size="31" font-weight="700">-15.3%</text>
<text x="636" y="416" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="15">baseline -34.2%</text>
<text x="636" y="444" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="13">peak to trough</text>
<rect x="886" y="286" width="246" height="178" rx="18" fill="#0f1d2f" stroke="#20324a"/>
<text x="910" y="326" fill="#7dd3fc" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="700">SELECTION CONTROL</text>
<text x="910" y="379" fill="#4ade80" font-family="ui-monospace,SFMono-Regular,monospace" font-size="31" font-weight="700">p=0.467</text>
<text x="910" y="416" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="15">not significant</text>
<text x="910" y="444" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="13">max-stat p-value</text>
<rect x="64" y="502" width="1072" height="126" rx="18" fill="#171b2b" stroke="#4c3b64"/>
<text x="94" y="540" fill="#c4b5fd" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">CLAIM BOUNDARY</text>
<text x="94" y="579" fill="#f8fafc" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="700">Useful risk-management evidence; no statistically confirmed alpha or capacity claim.</text>
<text x="94" y="608" fill="#94a3b8" font-family="Inter,Arial,sans-serif" font-size="14">All tried lookbacks are disclosed; costs, chronology, folds, source hash, and artifact hashes are machine-readable.</text>
<text x="64" y="671" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="13">Generated by microalpha market-demo · values rounded from receipt-bound artifacts</text>
</svg>
