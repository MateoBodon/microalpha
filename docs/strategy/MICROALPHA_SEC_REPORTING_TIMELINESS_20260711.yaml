frozen_mechanism:
  candidate_id: sec_reporting_timeliness_quality__equal
  signal: sec_reporting_timeliness_quality
  weighting: equal
  filing_contract:
    form: 10-K
    is_xbrl: true
    original_only_exclude_amendments: true
    selection: earliest acceptanceDateTime per CIK/reportDate
    availability: exact SEC acceptanceDateTime, normalized to its UTC calendar date for month-end formation
    expiry: acceptance date plus eighteen calendar months
    valid_delay_days_inclusive: [1, 200]
    consecutive_report_gap_days_inclusive: [300, 430]
    latest_available_record_only: true
  raw_features:
    reporting_timeliness_level: negative of current acceptance UTC date minus current reportDate in calendar days
    reporting_timeliness_change: prior reporting-delay days minus current reporting-delay days
  feature_rank_order:
    - reporting_timeliness_level
    - reporting_timeliness_change
  ranking:
    group: formation_date and point-in-time FF12 industry
    transform: average-tie percentile rank centered to [-1, 1]
    composite: equal arithmetic mean of both complete feature ranks
    direction: faster absolute filing and improved year-over-year timeliness rank higher
    tie_break: ascending PERMNO
  missing_value_imputation: forbidden
  ccm_contract:
    linktype: [LC, LU]
    linkprim: [P, C]
    interval_must_cover_formation_date: true
    ambiguous_permno_formation_gvkey_count: reject
  portfolio_and_costs: inherit unchanged from base protocol

