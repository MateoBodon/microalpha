objective:
  authoritative_goal: >-
    Freeze one genuinely distinct point-in-time SEC filing-metadata mechanism
    without retuning rejected accounting-value mechanisms, projecting
    2017-2022 validation returns, or opening the 2023-2025 final holdout.
  mechanism: >-
    Rank issuers on the absolute timeliness of the newest original XBRL 10-K
    and on improvement in report-to-acceptance delay versus the prior original
    XBRL 10-K. Slower filing and year-over-year delay deterioration rank lower.
  economic_hypothesis: >-
    A longer annual reporting lag, especially a deterioration relative to the
    issuer's own prior lag, can indicate operational complexity, weak reporting
    controls, or adverse information-processing frictions. The effect is
    measured within point-in-time FF12 industry to reduce structural reporting
    differences across industries.
  distinctness: >-
    The signal uses no accounting values, returns, prices, volatility,
    estimates, analyst revisions, or current Compustat fundamentals. It does
    not change any feature, sign, weight, or gate of QVPI or first-filed
    cash-earnings acceleration.
  claim_limit: >-
    This lifecycle supports only source feasibility, preregistration, and
    tested metadata chronology. It makes no coverage, return, alpha,
    promotion, or final-holdout claim.

