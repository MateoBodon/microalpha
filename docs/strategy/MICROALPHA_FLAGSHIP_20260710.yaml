    source: momentum_deciles_monthly
  - id: cash_rf
    source: ff5_daily.RF
  - id: legacy_40_name_wrds_run
    source: docs/artifacts/resume/wrds/2026-02-16T22-33-46Z-8d90621
    classification: historical_noncomparable

promotion_gates:
  result_artifact_required: true
  required_outputs:
    - source_manifest.json
    - derived_panel_manifest.json
    - selected_model.json
    - validation_candidate_table.csv
    - final_holdout_metrics.json
    - baseline_comparison.csv
    - cost_stress.csv
    - exposure_diagnostics.csv
    - integrity_report.json
  performance_result:
    - Final-holdout net Sharpe_HAC is positive.
    - Final-holdout CAGR is positive.
    - Final-holdout max drawdown is at most 25 percent.
    - The selected model is not inferior to the strongest investable baseline
      by more than 0.10 Sharpe.
  alpha_wording:
    - Stationary-bootstrap or SPA family-wise p-value is at most 0.10.
    - FF5 plus MOM alpha has absolute HAC t-statistic at least 1.96.
  failure_posture: >-
    Always retain and report the result. If a promotion gate fails, publish it
    internally as a rigorous null/negative finding and do not claim alpha.
