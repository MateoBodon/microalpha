universe:
  identifier: permno
  point_in_time: true
  filters_at_formation_date:
    sharetype: [NS]
    securitytype: [EQTY]
    securitysubtype: [COM]
    usincflg: [Y]
    primaryexch: [N, A, Q]
    conditionaltype: [RW]
    tradingstatusflg: [A]
    minimum_price: 5.0
    minimum_market_cap_usd: 250000000
    minimum_60d_median_dollar_volume_usd: 5000000
    minimum_return_history_months: 12
  industry_classification: point-in-time FF12 mapping from siccd
  exclusions:
    - No current-constituent or ticker-survivor universe.
    - No security is admitted using information observed after formation.

return_semantics:
  source_return: dlyret
  delisting_audit_table: stkdelists
  resolution: >-
    CIZ emits a dlydelflg=Y pseudo-day at stkdelists.deldlydt and dlyret equals
    stkdelists.delret when both are present. Use dlyret exactly once; the
    delisting table is an audit cross-check and must never be compounded onto
    dlyret.
  bounded_evidence: >-
    A read-only 2005 slice found 489 dlydelflg=Y rows; sampled matched rows had
    dlycaldt=deldlydt and dlyret=delret, including missing-code agreement.
  hard_stops:
    - A flagged delisting pseudo-day has no unique stkdelists match.
    - Numeric dlyret and delret disagree beyond source precision.
    - Any implementation attempts to compound dlyret and delret.
  execution_lag: Signal at month-end t; trade on the next available session.

candidate_grid:
  signals:
    - mom_12_2
    - mom_6_2
    - blend_12_2_6_2
  weighting:
    - equal
    - inverse_vol_126d
  total_candidates: 6
  common_rules:
    industry_neutral: true
    monthly_rebalance: true
    long_fraction: 0.10
    short_fraction: 0.10

selection_reducer:
  inputs: validation_only
  eligibility:
    - All six validation calendar years produce non-degenerate portfolios.
    - No chronology, identifier, return, delisting, or PnL integrity failure.
    - Validation max drawdown is at most 35 percent.
    - Median names per sleeve is at least 30.
  ordered_objective:
    - maximize_median_calendar_year_net_sharpe_hac
    - maximize_worst_calendar_year_net_return
    - minimize_one_way_turnover
  replay_rule: >-
    If an objective or data-semantics defect is discovered, correct the reducer
    before observing final-holdout results and replay all six candidates.

portfolio:
  capital_usd: 15000000
  target_gross_exposure: 1.0
  target_net_exposure: 0.0
  max_single_name_weight: 0.02
  max_industry_gross_weight: 0.15
  max_participation_of_60d_adv: 0.02

costs:
  primary:
    commission_bps_each_side: 5.0
    spread: contemporaneous_half_spread_each_side
    fallback_full_spread_bps: 10.0
    impact_formula: "10 bps * sqrt(participation_rate / 0.01)"
    annual_short_borrow_bps: 300.0
  stress:
    annual_short_borrow_bps: [0.0, 600.0]
    cost_multiplier: [0.5, 2.0]
  zero_cost_output: diagnostic_only

baselines:
  - id: crsp_vw_market
