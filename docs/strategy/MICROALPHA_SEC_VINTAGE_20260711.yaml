frozen_mechanism:
  candidate_id: sec_cash_earnings_acceleration__equal
  signal: sec_cash_earnings_acceleration
  weighting: equal
  filing_contract:
    form: 10-K
    is_xbrl: true
    original_only_exclude_amendments: true
    selection: earliest acceptanceDateTime per CIK/reportDate
    accession_binding: every fact row accn must equal the selected filing accession
    current_period_binding:
      instant: end equals reportDate and start is absent
      duration: end equals reportDate and duration is 300 to 450 days inclusive
      multiple_duration_rule: select the longest duration; conflicting equal-longest values are missing
    consecutive_report_gap_days_inclusive: [300, 430]
    availability: exact SEC acceptanceDateTime, normalized to its UTC calendar date for month-end formation
    expiry: acceptance date plus eighteen calendar months
  concepts:
    assets: "us-gaap:Assets USD"
    net_income: "us-gaap:NetIncomeLoss USD"
    operating_cash_flow: "us-gaap:NetCashProvidedByUsedInOperatingActivities USD"
  concept_aliases: forbidden
  missing_value_imputation: forbidden
  raw_features:
    earnings_surprise: current net income minus prior net income, divided by prior assets
    cashflow_surprise: current operating cash flow minus prior operating cash flow, divided by prior assets
    cash_conversion: current operating cash flow minus current net income, divided by prior assets
    asset_discipline: negative of current assets divided by prior assets minus one
  feature_rank_order:
    - earnings_surprise
    - cashflow_surprise
    - cash_conversion
    - asset_discipline
  ranking:
    group: formation_date and point-in-time FF12 industry
    transform: average-tie percentile rank centered to [-1, 1]
    composite: equal arithmetic mean of all four complete feature ranks
    tie_break: ascending PERMNO
  ccm_contract:
    linktype: [LC, LU]
    linkprim: [P, C]
    interval_must_cover_formation_date: true
    ambiguous_permno_formation_gvkey_count: reject
  portfolio_and_costs: inherit unchanged from base protocol

