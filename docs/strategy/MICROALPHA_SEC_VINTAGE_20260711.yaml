objective:
  authoritative_goal: >-
    Test one economically distinct, true first-filed accounting-change
    mechanism after the current-snapshot QVPI failure, without changing that
    rejected mechanism, using current Compustat values, or opening the
    2023-2025 final return holdout.
  mechanism: >-
    Cash-confirmed earnings acceleration and balance-sheet discipline measured
    only from values present in two consecutive original XBRL 10-K filings.
    Each value is bound to its filing accession and becomes usable only at the
    exact SEC acceptanceDateTime of the newer filing.
  economic_hypothesis: >-
    Improvements in first-filed earnings that are corroborated by operating
    cash-flow improvement, high cash conversion, and restrained asset growth
    are more persistent and less exposed to accrual reversal than unconfirmed
    earnings changes. Industry-relative ranks prevent broad sector accounting
    differences from becoming the signal.
  claim_limit: >-
    This is preregistered 2017-2022 validation evidence, not final-holdout or
    production-alpha evidence. The CIK-to-GVKEY bridge is current Compustat
    identifier metadata, not historical accounting values; 47 eligible
    PERMNO/GVKEY pairs lack a CIK and are excluded. SEC bulk JSON members are
    unpartitioned and can contain later facts, so member bytes are decoded but
    only accession-matched filings accepted by 2022-11-30 are selected.

