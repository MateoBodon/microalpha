objective:
  authoritative_goal: >-
    Test one pure short-horizon reversal mechanism that is economically distinct
    from momentum and low-volatility using the existing CRSP-v2 selection panel,
    unchanged implementation rules, and fixed strength gates.
  proxy_warning: >-
    The 2017-2022 validation result is a mechanism screen, not final-holdout
    evidence and not an alpha claim.

