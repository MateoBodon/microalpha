access_contract:
  permitted_dates: "2005-01-01 through 2022-12-31"
  final_holdout_dates: "2023-01-01 through 2025-12-31"
  final_holdout_outcomes_read: false
  hard_stop: Any final-holdout outcome access before a separate post-freeze decision.

economic_hypothesis: >-
  Temporary liquidity shocks and investor overreaction can partially reverse in
  the next month. Ranking the negative formation-month stock return relative to
  the contemporaneous FF12-industry median isolates firm-specific reversal from
  broad industry moves without using any fitted coefficient.

mechanism:
  candidate_id: short_term_reversal_1_1__equal
  signal: short_term_reversal_1_1
  signal_definition: >-
    Negative formation-month stock total return minus contemporaneous FF12
    industry median return, observed at month-end and traded the next month.
  direction: long prior-month industry-relative losers and short winners
  weighting: equal
  candidate_count: 1
  fixed_rules:
    - No residual threshold, winsorization, or coefficient is fitted.
    - The existing ten-percent long and short sleeves are unchanged.
    - Trade execution begins in the following calendar month.

portfolio_cost_capacity_contract:
  source: docs/strategy/MICROALPHA_FLAGSHIP_20260710.yaml
  unchanged_rules:
    - 15000000 USD capital
    - 1.0 gross and 0.0 net exposure
    - point-in-time FF12 industry neutrality
    - 2 percent single-name cap
    - 15 percent industry gross cap
    - 2 percent of 60-day ADV participation cap
    - 5 bps commission each side
    - contemporaneous half-spread each side with 10 bps full-spread fallback
    - square-root impact and 300 bps annual short borrow
  stress_grid:
    annual_short_borrow_bps: [0.0, 600.0]
    nonborrow_cost_multiplier: [0.5, 2.0]

baselines:
  - exact rerun of archived blend_12_2_6_2__inverse_vol_126d
  - exact rerun of archived residual_mom_12_2__equal
  - exact rerun of archived low_volatility_126d__equal
  - identical-universe classic 12-2 momentum with identical costs and capacity
  - CRSP value-weight and equal-weight markets
  - Ken French MOM and prior-12-2 decile spread
  - cash RF
  - legacy result retained as historical noncomparable evidence only

mechanism_gate:
  minimum_net_sharpe_hac: 0.45
  minimum_hac_tstat: 1.50
  minimum_sharpe_improvement_over_strongest_archived: 0.10
  maximum_drawdown: 0.25
  requirements:
    - structurally eligible under unchanged constraints
    - HAC Sharpe at least 0.45
    - HAC Sharpe t-stat at least 1.50
    - HAC Sharpe at least 0.10 above the strongest archived candidate
    - positive CAGR and at most 25 percent drawdown
    - positive Sharpe and CAGR at 600 bps borrow plus 2x nonborrow costs
  pass_outcome: Freeze the mechanism while keeping the final holdout sealed.
  fail_outcome: Archive the mechanism and change economic method without retuning.

claim_boundary:
  alpha_claim_allowed: false
  final_holdout_promotion_allowed: false
  public_release_allowed: false
