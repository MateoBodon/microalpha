frozen_mechanism:
  candidate_id: qvpi_annual_composite__equal
  signal: qvpi_annual_composite
  weighting: equal
  annual_record_contract:
    availability_date: datadate plus six calendar months
    expiry_date: datadate plus eighteen calendar months
    prior_record_spacing_months_inclusive: [9, 15]
    latest_available_record_only: true
    missing_feature_imputation: forbidden
    preferred_stock_fallback_order: [pstkrv, pstkl, pstk, zero]
  ccm_contract:
    linktype: [LC, LU]
    linkprim: [P, C]
    interval_must_cover_formation_date: true
    ambiguous_permno_formation_gvkey_count: reject
  raw_features:
    book_equity_musd: ceq plus zero-filled txditc minus preferred stock fallback
    book_to_market: book_equity_musd times 1000000 divided by formation market_cap_usd
    gross_profitability: sale minus cogs divided by prior-year total assets
    operating_profitability: sale minus cogs minus xsga minus xint divided by book_equity_musd
    conservative_investment: negative of total assets divided by prior-year total assets minus one
    accrual_quality: >-
      Negative of [change in (total assets minus cash) minus change in
      (total liabilities minus current debt minus long-term debt) minus
      depreciation] divided by average current and prior-year total assets.
  eligibility:
    - Base CRSP formation eligibility is true.
    - Book equity, book-to-market, current assets, and prior-year assets are positive.
    - All four family inputs are finite and non-null.
    - The CCM mapping is unique for the PERMNO and formation month.
  ranking:
    group: formation_date and point-in-time FF12 industry
    transform: average-tie percentile rank centered to [-1, 1]
    profitability_family: equal mean of gross and operating profitability ranks
    composite: equal mean of value, profitability, conservative investment, and accrual quality family ranks
    tie_break: ascending PERMNO
  portfolio_and_costs: inherit unchanged from base protocol

