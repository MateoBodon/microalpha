objective:
  authoritative_goal: >-
    Test one economically distinct accounting mechanism after the CRSP-only
    return, residual-return, low-volatility, and reversal plateau, without
    opening the 2023-2025 final holdout or tuning after validation outcomes.
  mechanism: >-
    A single equal-family quality, value, profitability, and conservative
    investment composite using annual Compustat fundamentals, historical CCM
    links, and the already-sealed CRSP-v2 selection panel.
  claim_limit: >-
    The Compustat files are a current snapshot rather than a historical
    vintage archive. The fixed six-month lag protects statement availability
    timing, but cannot remove later-restatement leakage. This run is therefore
    conservative-lag snapshot validation evidence, not a true vintage or
    production alpha claim.

