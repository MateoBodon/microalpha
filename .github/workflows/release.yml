name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Smoke-test wheel in a clean environment
        run: |
          python -m venv /tmp/microalpha-wheel-smoke
          /tmp/microalpha-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/microalpha-wheel-smoke/bin/python -m microalpha audit-demo --out /tmp/audit-lab
          /tmp/microalpha-wheel-smoke/bin/python -m microalpha verify /tmp/audit-lab
          /tmp/microalpha-wheel-smoke/bin/python -m microalpha market-demo \
            --input data/factors/ff5_mom_daily.csv --out /tmp/market-case
          /tmp/microalpha-wheel-smoke/bin/python -m microalpha verify /tmp/market-case

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: "dist/*"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: microalpha-distributions
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes

      # The "microalpha" name on PyPI belongs to an unrelated project.
      # Releases intentionally remain GitHub-only unless the distribution is renamed.
