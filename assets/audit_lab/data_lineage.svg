<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
<title id="title">Microalpha audit data lineage</title>
<desc id="desc">A safe pipeline moves a synthetic oracle through availability, event scheduling, cost reconciliation, and an artifact receipt.</desc>
<rect width="1200" height="360" rx="24" fill="#f8fafc"/>
<text x="55" y="58" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700">Audit lineage: every claim has a clock and a hash</text>
<rect x="55" y="116" width="190" height="78" rx="14" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
<text x="150.0" y="148" text-anchor="middle" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700">Synthetic oracle</text>
<text x="150.0" y="173" text-anchor="middle" fill="#475569" font-family="Inter,Arial,sans-serif" font-size="12">seed + schema</text>
<path d="M 255 155.0 H 288" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="302" y="116" width="190" height="78" rx="14" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
<text x="397.0" y="148" text-anchor="middle" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700">Availability gate</text>
<text x="397.0" y="173" text-anchor="middle" fill="#475569" font-family="Inter,Arial,sans-serif" font-size="12">available_at ≤ decision_at</text>
<path d="M 502 155.0 H 535" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="549" y="116" width="190" height="78" rx="14" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
<text x="644.0" y="148" text-anchor="middle" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700">Event queue</text>
<text x="644.0" y="173" text-anchor="middle" fill="#475569" font-family="Inter,Arial,sans-serif" font-size="12">fill only at market time</text>
<path d="M 749 155.0 H 782" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="796" y="116" width="190" height="78" rx="14" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
<text x="891.0" y="148" text-anchor="middle" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700">Cost ledger</text>
<text x="891.0" y="173" text-anchor="middle" fill="#475569" font-family="Inter,Arial,sans-serif" font-size="12">gross − 4 components</text>
<path d="M 996 155.0 H 1029" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="1043" y="116" width="102" height="78" rx="14" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
<text x="1094.0" y="148" text-anchor="middle" fill="#0f172a" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="700">Receipt</text>
<text x="1094.0" y="173" text-anchor="middle" fill="#475569" font-family="Inter,Arial,sans-serif" font-size="12">SHA-256</text>
<defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#38bdf8"/></marker></defs>
<path d="M 302 238 H 739" stroke="#e11d48" stroke-width="2" stroke-dasharray="8 6"/>
<text x="520" y="270" text-anchor="middle" fill="#be123c" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">Fail closed: unavailable rows or early fills never enter state</text>
<text x="55" y="326" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="13">Synthetic fixture only · no provider, licensed dataset, holdout, or network access</text>
</svg>
